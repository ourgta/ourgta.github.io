<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ourgta_find</title>

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a href="/index"><h1>home</h1></a>

    <form action="/find">
      <input type="text" name="name" placeholder="name" />
    </form>

    <img
      style="display: none"
      src="/img/spinner-solid.svg"
      id="loading"
      class="rotate"
      width="64"
      height="64"
      alt=""
    />

    <table id="findtable" style="display: none">
      <tr>
        <th>name</th>
        <th>server</th>
        <th>seen</th>
      </tr>
    </table>

    <a id="previous" class="offline">previous_page</a>
    <a id="next" class="offline">next_page</a>

    <script src="/js/common.js" defer></script>
    <script defer>
      (async () => {
        const params = new URLSearchParams(document.location.search);
        const name = params.get("name");
        const page = parseInt(params.get("page")) || 1;

        document.getElementById("loading").style.display = "block";
        const response = await fetch(
          `https://glassfrog.duckdns.org/find?name=${encodeURIComponent(
            name
          )}&page=${page}`
        );

        if (response.status === 429) {
          rateLimit(response.headers);
          return;
        }

        const data = await response.json();
        document.getElementById("loading").style.display = "none";

        if (!data.rows.length) {
          const header = document.createElement("p");
          header.innerText = "No results 😱";
          document.body.appendChild(header);
          return;
        }

        const table = document.getElementById("findtable");
        for (const record of data.rows) {
          const row = table.insertRow(-1);
          const anchor = document.createElement("a");
          anchor.innerText = record.name;
          anchor.href = `/logs?pid=${record.pid}`;
          row.insertCell(-1).appendChild(anchor);
          row.insertCell(-1).innerText = { 19736: "life", 397528: "events" }[
            record.sid
          ];
          row.insertCell(-1).innerText = parseDate(new Date(record.biggest));
        }

        document.getElementById("findtable").style.display = null;

        if (page > 1) {
          const anchor = document.getElementById("previous");
          anchor.href = `/find?name=${encodeURIComponent(name)}&page=${
            page - 1
          }`;
          anchor.classList.remove("offline");
        }

        if (data.next) {
          const anchor = document.getElementById("next");
          anchor.href = `/find?name=${encodeURIComponent(name)}&page=${
            page + 1
          }`;
          anchor.classList.remove("offline");
        }
      })();
    </script>
  </body>
</html>
