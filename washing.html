<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Washing</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@next/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <label>
        Load
        <form role="group">
          <input id="weight" oninput="index()" />
          <select id="weightUnit" oninput="index()">
            <option value="kg" selected>kg</option>
            <option value="lb">lb</option>
          </select>
        </form>
      </label>

      <details>
        <summary role="button" class="outline secondary">
          Adjust default load
        </summary>

        <label>
          Powder
          <form role="group">
            <input id="powder" oninput="index()" placeholder="50" />
            <button class="secondary" disabled>ml</button>
          </form>
        </label>

        <label>
          Powder ratio
          <div class="grid">
            <form role="group">
              <input id="powderWeight" oninput="index()" placeholder="65" />
              <button class="secondary" disabled>g</button>
            </form>

            <form role="group">
              <input id="powderVolume" oninput="index()" placeholder="97" />
              <button class="secondary" disabled>ml</button>
            </form>
          </div>
        </label>

        <label>Load range</label>
        <div class="grid">
          <label>
            Minimum
            <form role="group">
              <input id="powderMinimumLoad" oninput="index()" placeholder="4" />
              <button class="secondary" disabled>kg</button>
            </form>
          </label>

          <label>
            Maximum
            <form role="group">
              <input id="powderMaximumLoad" oninput="index()" placeholder="6" />
              <button class="secondary" disabled>kg</button>
            </form>
          </label>
        </div>
      </details>

      <label>
        Powder
        <form role="group">
          <input type="text" id="grams" readonly />
          <button class="secondary" disabled>g</button>
        </form>
      </label>
    </main>

    <script src="/js/washing.js"></script>
  </body>
</html>
