<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ourgta_rate_limit</title>

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <img
      src="/img/spinner-solid.svg"
      id="loading"
      class="rotate"
      width="64"
      height="64"
      alt=""
    />

    <script defer>
      const params = new URLSearchParams(document.location.search);
      const date = new Date(params.get("date"));
      setTimeout(() => {
        window.location.href = params.get("url");
      }, date.getTime() - new Date().getTime());

      const paragraph = document.createElement("p");
      paragraph.textContent = `You are being rate limited for making too many consecutive requests, you will be redirected at ${date.toLocaleTimeString()}.`;
      document.body.insertBefore(paragraph, document.body.firstChild);
    </script>
  </body>
</html>
