<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ourgta_index</title>

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a href="/index"><h1>home</h1></a>

    <h2>find</h2>

    <form action="/find">
      <input type="text" name="name" placeholder="name" />
    </form>

    <h2>recent_players</h2>
    <img
      src="/img/spinner-solid.svg"
      id="loading"
      class="rotate"
      width="64"
      height="64"
      alt=""
    />
    <ul id="players"></ul>

    <script src="/js/common.js" defer></script>
    <script defer>
      (async () => {
        const response = await fetch("https://glassfrog.duckdns.org/players");

        if (response.status === 429) {
          rateLimit(response.headers);
          return;
        }

        const players = await response.json();

        const list = document.getElementById("players");
        for (const player of players.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, {
            sensitivity: "base",
          })
        )) {
          const anchor = document.createElement("a");
          anchor.href = `/names?pid=${player.pid}`;
          anchor.appendChild(document.createTextNode(player.name));

          if (!player.online) anchor.classList.add("offline");

          const listItem = document.createElement("li");
          listItem.appendChild(anchor);
          list.appendChild(listItem);
        }

        document.getElementById("loading").style.display = "none";
      })();
    </script>
  </body>
</html>
