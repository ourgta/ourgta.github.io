<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ourgta_logs</title>

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a href="/index"><h1>home</h1></a>

    <h2>find</h2>

    <form action="/find">
      <input type="text" name="name" placeholder="name" />
    </form>

    <h2><a id="names">names</a></h2>

    <h2>logs</h2>

    <img
      style="display: none"
      src="/img/spinner-solid.svg"
      id="loading"
      class="rotate"
      width="64"
      height="64"
      alt=""
    />

    <table id="logstable" style="display: none">
      <tr>
        <th>name</th>
        <th>server</th>
        <th>joined</th>
        <th>left</th>
        <th>length</th>
      </tr>
    </table>

    <a id="previous" class="offline">previous_page</a>
    <a id="next" class="offline">next_page</a>

    <script src="/js/common.js" defer></script>
    <script defer>
      (async () => {
        const params = new URLSearchParams(document.location.search);
        const pid = parseInt(params.get("pid"));
        if (!pid) return;

        document.getElementById("names").href = `/names?pid=${pid}`;
        const page = parseInt(params.get("page")) || 1;

        document.getElementById("loading").style.display = "block";
        const response = await fetch(
          `https://glassfrog.duckdns.org/logs?pid=${pid}&page=${page}`
        );

        if (response.status === 429) {
          rateLimit(response.headers);
          return;
        }

        const data = await response.json();
        document.getElementById("loading").style.display = "none";

        if (!data.rows.length) {
          const header = document.createElement("p");
          header.innerText = "No results 😱";
          document.body.appendChild(header);
          return;
        }

        let title;
        const table = document.getElementById("logstable");
        for (const { name, sid, add, remove } of data.rows) {
          if (title === undefined) title = name;

          const row = table.insertRow(-1);
          row.insertCell(-1).innerText = name;
          row.insertCell(-1).innerText = { 19736: "life", 397528: "events" }[
            sid
          ];
          row.insertCell(-1).innerText = parseDate(add) || "";
          row.insertCell(-1).innerText = parseDate(remove);
          if (!add || !remove) continue;
          row.insertCell(-1).innerText = timeBetween(
            new Date(add),
            new Date(remove)
          );
        }

        if (title !== undefined) document.title = title;

        document.getElementById("logstable").style.display = null;

        if (page > 1) {
          const anchor = document.getElementById("previous");
          anchor.href = `/logs?pid=${pid}&page=${page - 1}`;
          anchor.classList.remove("offline");
        }

        if (data.next) {
          const anchor = document.getElementById("next");
          anchor.href = `/logs?pid=${pid}&page=${page + 1}`;
          anchor.classList.remove("offline");
        }
      })();
    </script>
  </body>
</html>
